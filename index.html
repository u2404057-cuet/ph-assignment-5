<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy UI & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-base-200">
    <section class="flex justify-center items-center h-screen w-screen bg-base-200 border-2 border-black">
        <div class="my-auto w-sm md:w-md mx-auto bg-white shadow-2xl p-8">
            <div class="flex flex-col justify-center items-center">
                <div class="image mb-3">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
                <div class="card-body">
                  <fieldset class="fieldset">
                    <label class="label">Username</label>
                    <input id="username-input" type="text" class="input" placeholder="Enter Username" />
                    <div><p class="text-[#422ad5]">Default: admin</p></div>
                    <label class="label">Password</label>
                    <input id="password-input" type="password" class="input" placeholder="Enter Password" />
                    <div><p class="text-[#422ad5]">Default: admin123</p></div>
                    <button id="login-btn" class="btn btn-primary mt-4">Login</button>
                  </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="./script/login.js"></script>
</body>
</html>
